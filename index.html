<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RVYC Member Points Checker</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        linear-gradient(rgba(40,50,60,0.35), rgba(40,50,60,0.35)),
        url('https://drive.google.com/thumbnail?id=1s7wb-e0rZMUJtR6ntMbgfyYRFhXzJQn2&sz=w2000');
      background-size: cover;
      background-position: center;
    }

    .overlay {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 800px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    h1 { color:#083c68; }

    input {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 80%;
      padding: 12px;
      border-radius: 10px;
      background: #083c68;
      color: white;
      border: none;
      font-size: 18px;
      cursor: pointer;
    }

    .box {
      margin-top:20px;
      padding:15px;
      border:1px solid #ddd;
      border-radius:15px;
    }

    table {
      width:100%;
      margin-top:20px;
      border-collapse: collapse;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }
  </style>
</head>

<body>
<div class="overlay">
<div class="card">

<h1>Royal Varuna Yacht Club</h1>
<h3>Check Your Membership Points</h3>

<input type="text" id="code" placeholder="Enter Membership Code">
<br>
<button onclick="searchMember()">Check Points</button>

<div id="result" class="box" style="display:none;"></div>

<table id="top5" style="display:none;">
<thead>
<tr>
<th>Rank</th>
<th>Code</th>
<th>Name</th>
<th>Point</th>
<th>Medal</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1e0__t3KIwv3zWKzlJLCDCEirjkB_BBLN_62lHCZyKnw/gviz/tq?tqx=out:json&sheet=Top%20Members&tq=select%20A,B,D,F,G";

let DATA = [];

async function loadData(){
  const res = await fetch(URL);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0,-2));

  DATA = json.table.rows.map(r=>{
    const c = r.c;
    return {
      code: c[0]?.v || "",
      name: c[1]?.v || "",
      point: c[2]?.v || 0,
      rank: c[3]?.v || "",
      medal: c[4]?.v || ""
    }
  });

  renderTop5();
}

function searchMember(){
  const code = document.getElementById("code").value.trim().toUpperCase();
  const m = DATA.find(x=>x.code.toUpperCase()===code);

  if(!m){
    alert("Not found");
    return;
  }

  document.getElementById("result").style.display="block";
  document.getElementById("result").innerHTML = `
    <h3>Member Information</h3>
    Code: ${m.code}<br>
    Name: ${m.name}<br>
    Point: ${m.point}<br>
    Rank: ${m.rank}<br>
    Medal: ${m.medal}
  `;
}

function renderTop5(){
  const tb = document.querySelector("#top5 tbody");
  tb.innerHTML="";

  DATA.sort((a,b)=>a.rank-b.rank).slice(0,5).forEach(x=>{
    tb.innerHTML += `
      <tr>
        <td>${x.rank}</td>
        <td>${x.code}</td>
        <td>${x.name}</td>
        <td>${x.point}</td>
        <td>${x.medal}</td>
      </tr>
    `;
  });

  document.getElementById("top5").style.display="table";
}

loadData();
</script>

</body>
</html>
