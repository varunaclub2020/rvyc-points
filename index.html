<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RVYC Member Points Checker</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      min-height: 100vh;
      background:
        linear-gradient(rgba(40,50,60,0.35), rgba(40,50,60,0.35)),
        url('https://drive.google.com/thumbnail?id=1s7wb-e0rZMUJtR6ntMbgfyYRFhXzJQn2&sz=w2000');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .overlay {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 15px;
    }

    .card {
      width: 100%;
      max-width: 820px;
      background: rgba(255,255,255,0.92);
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.25);
      backdrop-filter: blur(3px);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo-wrap img {
      max-width: 90px;
      max-height: 90px;
      object-fit: contain;
    }

    h1 {
      text-align: center;
      color: #082f53;
      font-size: 30px;
      line-height: 1.15;
      margin: 10px 0;
    }

    .sub {
      text-align: center;
      margin-bottom: 20px;
      color: #555;
      font-size: 17px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #0a3156;
      font-weight: 700;
      font-size: 17px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #b7c7d8;
      margin-bottom: 12px;
      font-size: 17px;
      outline: none;
      background: rgba(255,255,255,0.96);
    }

    input:focus {
      border-color: #0b3f6d;
      box-shadow: 0 0 0 4px rgba(11, 63, 109, 0.12);
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(180deg, #083c68 0%, #062f53 100%);
      color: white;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(6, 47, 83, 0.22);
    }

    .message {
      text-align: center;
      margin: 12px 0 14px;
      min-height: 22px;
      color: #444;
      font-size: 16px;
    }

    .error {
      color: #c91d25;
      font-weight: 700;
    }

    .loading {
      color: #0a3156;
      font-weight: 700;
    }

    .box {
      display: none;
      margin-top: 18px;
      background: rgba(247, 251, 255, 0.96);
      border: 1px solid #d7e1eb;
      border-radius: 14px;
      padding: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .title {
      text-align: center;
      color: #082f53;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .item {
      background: #ffffff;
      border: 1px solid #dde7f0;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 3px 10px rgba(18, 50, 77, 0.05);
    }

    .item.full {
      grid-column: 1 / -1;
      text-align: center;
    }

    .small {
      font-size: 13px;
      color: #6b7c8e;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .value {
      font-size: 26px;
      font-weight: 700;
      color: #17324d;
      line-height: 1.2;
    }

    .value.name-text,
    .value.code-text {
      font-size: 18px;
    }

    .value.medal-big {
      font-size: 50px;
      line-height: 1;
    }

    .top5 {
      display: none;
      margin-top: 22px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.97);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(18, 50, 77, 0.08);
    }

    th {
      background: linear-gradient(180deg, #083c68 0%, #062f53 100%);
      color: white;
      padding: 12px 10px;
      font-size: 15px;
    }

    td {
      border-bottom: 1px solid #e7edf3;
      padding: 12px 10px;
      text-align: center;
      font-size: 15px;
      color: #17324d;
    }

    tr:nth-child(even) td {
      background: #f8fbfd;
    }

    .top-rank td {
      background: #fff8e1 !important;
    }

    .rank-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #eaf2f8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #0a3156;
    }

    .medal-cell {
      font-size: 26px;
      line-height: 1;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      color: #5e6a75;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="card">
      <div class="logo-wrap">
        <img id="logo" alt="RVYC Logo"
          src="https://drive.google.com/thumbnail?id=1H7I9UH5xVCeiIPCSlHIQ1gm1EaFljHhT&sz=w1000">
      </div>

      <h1>Royal Varuna Yacht Club<br>Check Your Membership Points</h1>
      <div class="sub">Enter your Membership Code to view your current points and ranking.</div>

      <label for="memberCode">Membership Code</label>
      <input type="text" id="memberCode" placeholder="Enter Membership Code">

      <button id="searchBtn">Check Points</button>

      <div id="message" class="message loading">Loading member data...</div>

      <div id="infoBox" class="box">
        <div class="title">Member Information</div>
        <div class="grid">
          <div class="item">
            <div class="small">Membership Code</div>
            <div class="value code-text" id="vCode">-</div>
          </div>

          <div class="item">
            <div class="small">Member Name</div>
            <div class="value name-text" id="vName">-</div>
          </div>

          <div class="item">
            <div class="small">Point</div>
            <div class="value" id="vPoint">-</div>
          </div>

          <div class="item">
            <div class="small">Rank</div>
            <div class="value" id="vRank">-</div>
          </div>

          <div class="item full">
            <div class="small">Medal</div>
            <div class="value medal-big" id="vMedal">-</div>
          </div>
        </div>
      </div>

      <div id="top5Box" class="top5">
        <div class="title">Top 5 Members</div>
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Code</th>
              <th>Name</th>
              <th>Point</th>
              <th>Medal</th>
            </tr>
          </thead>
          <tbody id="top5Body"></tbody>
        </table>
      </div>

      <div class="footer">Royal Varuna Yacht Club</div>
    </div>
  </div>

  <script>
    const SHEET_JSON_URL =
      "https://docs.google.com/spreadsheets/d/1e0__t3KIwv3zWKzlJLCDCEirjkB_BBLN_62lHCZyKnw/gviz/tq?tqx=out:json&sheet=Top%20Members";

    let MEMBER_DATA = [];
    let TOP5_DATA = [];
    let DATA_READY = false;

    function setMessage(text, type) {
      const message = document.getElementById('message');
      message.className = 'message';
      if (type === 'error') message.classList.add('error');
      if (type === 'loading') message.classList.add('loading');
      message.textContent = text || '';
    }

    function safe(value) {
      if (value === null || value === undefined) return '';
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function fillMember(member) {
      document.getElementById('vCode').textContent = member.membershipCode || '-';
      document.getElementById('vName').textContent = member.memberName || '-';
      document.getElementById('vPoint').textContent = member.point || 0;
      document.getElementById('vRank').textContent = member.rank || '-';
      document.getElementById('vMedal').textContent = member.medal || '-';
      document.getElementById('infoBox').style.display = 'block';
    }

    function renderTop5() {
      const top5Body = document.getElementById('top5Body');
      const top5Box = document.getElementById('top5Box');

      top5Body.innerHTML = '';

      if (!TOP5_DATA.length) {
        top5Box.style.display = 'none';
        return;
      }

      TOP5_DATA.forEach(function(item) {
        const tr = document.createElement('tr');
        if (String(item.rank) === '1') tr.classList.add('top-rank');

        tr.innerHTML =
          '<td><span class="rank-circle">' + safe(item.rank) + '</span></td>' +
          '<td>' + safe(item.membershipCode) + '</td>' +
          '<td>' + safe(item.memberName) + '</td>' +
          '<td>' + safe(item.point) + '</td>' +
          '<td class="medal-cell">' + safe(item.medal) + '</td>';

        top5Body.appendChild(tr);
      });

      top5Box.style.display = 'block';
    }

    function searchMember() {
      const code = document.getElementById('memberCode').value.trim().toUpperCase();
      document.getElementById('infoBox').style.display = 'none';

      if (!DATA_READY) {
        setMessage('Data is still loading. Please wait a moment.', 'error');
        return;
      }

      if (!code) {
        setMessage('Please enter Membership Code.', 'error');
        return;
      }

      const member = MEMBER_DATA.find(function(item) {
        return String(item.membershipCode || '').trim().toUpperCase() === code;
      });

      if (member) {
        fillMember(member);
        setMessage('Member found successfully.');
      } else {
        setMessage('Membership Code not found.', 'error');
      }
    }

    async function loadSheetData() {
      try {
        setMessage('Loading member data...', 'loading');

        const res = await fetch(SHEET_JSON_URL);
        const text = await res.text();
        const jsonText = text.substring(47, text.length - 2);
        const data = JSON.parse(jsonText);

        const rows = data.table.rows.map(r => {
          const cells = r.c || [];
          return {
            membershipCode: cells[0] ? (cells[0].f || cells[0].v || '') : '',
            memberName: cells[1] ? (cells[1].f || cells[1].v || '-') : '-',
            point: cells[3] ? (cells[3].f || cells[3].v || 0) : 0,
            rank: cells[5] ? (cells[5].f || cells[5].v || '') : '',
            medal: cells[6] ? (cells[6].f || cells[6].v || '') : ''
          };
        });

        MEMBER_DATA = rows.filter(r => r.membershipCode);

        TOP5_DATA = [...MEMBER_DATA]
          .sort((a, b) => (Number(a.rank) || 999999) - (Number(b.rank) || 999999))
          .slice(0, 5);

        DATA_READY = true;
        renderTop5();
        setMessage('Ready');
      } catch (error) {
        setMessage('Unable to load data. Please check sheet sharing settings.', 'error');
        console.error(error);
      }
    }

    document.getElementById('searchBtn').addEventListener('click', searchMember);
    document.getElementById('memberCode').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchMember();
    });

    loadSheetData();
  </script>
</body>
</html>
