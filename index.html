<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RVYC Member Points Checker</title>
</head>
<body style="font-family: Arial, sans-serif; text-align:center; padding:40px;">
  <h1>Royal Varuna Yacht Club</h1>
  <h2>Member Points Checker</h2>

  <input id="code" placeholder="Enter Membership Code" style="padding:10px; width:260px;">
  <br><br>
  <button onclick="checkMember()" style="padding:10px 20px;">Check Points</button>

  <div id="result" style="margin-top:20px; font-size:18px;"></div>

  <script>
    function checkMember() {
      const code = document.getElementById('code').value.trim();
      document.getElementById('result').innerText = code
        ? 'Searching for: ' + code
        : 'Please enter Membership Code';
    }
  </script>
</body>
</html>
